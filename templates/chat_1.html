<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrapper {
            width: 80vw;
            height: 80vh;
            display: flex;
            flex-direction: column;
            border: 1px solid black;
        }
        .header {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }
        .header .who {
            font-weight: bold;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .controls {
            display: flex;
        }
        #msg {
            flex: 1;
        }
        input {
            padding: 8px;
            font-size: 1rem;
        }
        button {
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div>Logged in as: <span class="who">{{ user_name }}</span></div>
        </div>
        <div id="messages"></div>
        <div class="controls">
            <input id="msg" placeholder="message (enter)">
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById("messages");
        const msgInput = document.getElementById("msg");
        let lastRendered = "";

        function scrollBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function render(msgs) {
            const newRendered = msgs.map(m =>
                "[" + m.name + "] " + m.message
            ).join("<br>");
            if (newRendered !== lastRendered) {
                messagesDiv.innerHTML = newRendered;
                lastRendered = newRendered;
                scrollBottom();
            }
        }

        async function poll() {
            try {
                const res = await fetch("/poll");
                if (res.status === 401 || res.redirected) {
                    window.location = "/login";
                    return;
                }
                const data = await res.json();
                render(data.messages);
            } catch (err) {
                /* network hiccup — ignore this tick */
            }
        }

        async function send() {
            const message = msgInput.value;
            if (!message) return;
            const res = await fetch("/send", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message })
            });
            if (res.status === 401) {
                window.location = "/login";
                return;
            }
            msgInput.value = "";
            poll();
        }

        msgInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                send();
            }
        });

        poll();
        setInterval(poll, 1000);
    </script>
</body>
</html>
